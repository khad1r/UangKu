name: Build Production Docker Image And Deploy To Cloud Run

on:
  push:
    tags: ["v*"]
    branches: ["main"]

env:
  IMAGE_NAME: khad1r/uangku
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GC_CR_REGION }}
  SERVICE_NAME: uangku

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Main
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # Optimization: Use SHA for branch builds, Tag for releases
      - name: Set Docker tag
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "DOCKER_TAG=sha-${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile.production
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
          platforms: linux/amd64

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        # Explicit guard: Only deploy when a version tag is pushed
        if: startsWith(github.ref, 'refs/tags/v')
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: docker.io/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}
